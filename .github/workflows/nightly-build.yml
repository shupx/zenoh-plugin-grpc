name: nightly-build

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      upload_pypi:
        description: Upload built Python distributions to PyPI
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check nightly source changes
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.release-check.outputs.should_build }}
      build_date: ${{ steps.meta.outputs.build_date }}
      build_seq: ${{ steps.meta.outputs.build_seq }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      upload_pypi: ${{ steps.meta.outputs.upload_pypi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute build metadata
        id: meta
        env:
          UPLOAD_PYPI: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_pypi }}
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = '.github/workflows/nightly-build.yml';
            const currentRunId = Number(process.env.GITHUB_RUN_ID || '0');

            if (!currentRunId) {
              throw new Error('GITHUB_RUN_ID is missing; cannot compute nightly build metadata.');
            }

            const { data: currentRun } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: currentRunId,
            });

            const buildDay = (currentRun.created_at || '').slice(0, 10);
            if (!buildDay) {
              throw new Error(`Current workflow run ${currentRunId} is missing created_at.`);
            }

            const sameDayRuns = [];

            for (let page = 1; page <= 10; page += 1) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                per_page: 100,
                page,
              });

              const runs = data.workflow_runs || [];
              if (!runs.length) {
                break;
              }

              sameDayRuns.push(
                ...runs.filter((run) => (run.created_at || '').startsWith(buildDay))
              );

              if (runs[runs.length - 1]?.created_at?.slice(0, 10) < buildDay) {
                break;
              }
            }

            if (!sameDayRuns.some((run) => run.id === currentRunId)) {
              sameDayRuns.push(currentRun);
            }

            sameDayRuns.sort((left, right) => {
              const leftCreated = new Date(left.created_at || 0).getTime();
              const rightCreated = new Date(right.created_at || 0).getTime();
              return leftCreated - rightCreated || left.id - right.id;
            });

            const buildSeqIndex = sameDayRuns.findIndex((run) => run.id === currentRunId);
            if (buildSeqIndex === -1) {
              throw new Error(`Unable to locate current workflow run ${currentRunId} in the same-day run list.`);
            }

            const buildDate = buildDay.replace(/-/g, '');
            const buildSeq = String(buildSeqIndex + 1).padStart(2, '0');

            core.info(`Resolved nightly build date ${buildDate} and daily build sequence ${buildSeq}.`);
            core.setOutput('build_date', buildDate);
            core.setOutput('build_seq', buildSeq);
            core.setOutput('head_sha', currentRun.head_sha || process.env.GITHUB_SHA || context.sha);
            core.setOutput('upload_pypi', process.env.UPLOAD_PYPI || 'true');

      - name: Compare against latest successful nightly run
        id: release-check
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
        with:
          script: |
            let shouldBuild = true;
            const workflowId = '.github/workflows/nightly-build.yml';

            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch: context.ref.replace('refs/heads/', ''),
                status: 'success',
                per_page: 10,
              });

              const currentRunId = Number(process.env.GITHUB_RUN_ID || '0');
              const previousSuccessfulRun = (data.workflow_runs || []).find(
                (run) => run.id !== currentRunId
              );
              const lastSha = previousSuccessfulRun?.head_sha || '';

              core.info(`Current HEAD: ${process.env.HEAD_SHA}`);
              core.info(`Previous successful nightly SHA: ${lastSha || 'not found'}`);

              if (lastSha === process.env.HEAD_SHA) {
                shouldBuild = false;
              }
            } catch (error) {
              core.warning(`Unable to inspect prior nightly runs: ${error.message}`);
            }

            core.setOutput('should_build', shouldBuild ? 'true' : 'false');

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Nightly build decision"
            echo
            echo "- Build date: \`${{ steps.meta.outputs.build_date }}\`"
            echo "- Build sequence: \`${{ steps.meta.outputs.build_seq }}\`"
            echo "- HEAD SHA: \`${{ steps.meta.outputs.head_sha }}\`"
            echo "- Upload PyPI: \`${{ steps.meta.outputs.upload_pypi }}\`"
            echo "- Should build: \`${{ steps.release-check.outputs.should_build }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.arch }}
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform_id: linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform_id: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull build image
        run: docker pull shupeixuan/zenoh-plugin-grpc-build:latest

      - name: Clean previous dist
        run: rm -rf "dist/${{ matrix.platform_id }}"

      - name: Build inside container
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e CI=true \
            -e BUILD_DATE="${{ needs.check-changes.outputs.build_date }}" \
            -e BUILD_SEQ="${{ needs.check-changes.outputs.build_seq }}" \
            shupeixuan/zenoh-plugin-grpc-build:latest \
            bash -lc '
              git config --global --add safe.directory /workspace
              ./packaging/scripts/build-all.sh
            '

      - name: Verify artifacts
        shell: bash
        run: |
          test -d "dist/${{ matrix.platform_id }}"
          find "dist/${{ matrix.platform_id }}" -maxdepth 1 -type f | sort

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform_id }}
          path: dist/${{ matrix.platform_id }}/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish nightly release
    needs:
      - check-changes
      - build
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show artifact list
        shell: bash
        run: find release-artifacts -type f | sort

      - name: Select release assets
        shell: bash
        run: |
          set -euo pipefail

          src_root="release-artifacts"
          out_root="release-upload"
          rm -rf "${out_root}"
          mkdir -p "${out_root}"

          declare -A counts
          declare -A preferred
          declare -a files

          while IFS= read -r file; do
            files+=("${file}")
            base=$(basename "${file}")
            parent=$(basename "$(dirname "${file}")")
            counts["${base}"]=$(( ${counts["${base}"]:-0} + 1 ))

            if [[ "${parent}" == "nightly-linux-amd64" ]]; then
              preferred["${base}"]="${file}"
            elif [[ -z "${preferred["${base}"]:-}" ]]; then
              preferred["${base}"]="${file}"
            fi
          done < <(find "${src_root}" -type f | sort)

          for file in "${files[@]}"; do
            base=$(basename "${file}")
            parent=$(basename "$(dirname "${file}")")
            platform=${parent#nightly-}
            target_name="${base}"

            if [[ "${base}" == "manifest.json" || "${base}" == "BUILD_INFO.txt" ]]; then
              if [[ "${base}" == *.json ]]; then
                target_name="${base%.json}-${platform}.json"
              else
                target_name="${base%.txt}-${platform}.txt"
              fi
            elif [[ ${counts["${base}"]} -gt 1 && "${preferred["${base}"]}" != "${file}" ]]; then
              echo "Skipping duplicate asset ${base} from ${file}"
              continue
            fi

            cp "${file}" "${out_root}/${target_name}"
          done

          find "${out_root}" -type f | sort

      - name: Remove existing nightly assets
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'nightly',
              });

              for (const asset of release.assets) {
                core.info(`Deleting asset ${asset.name} (${asset.id})`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Move nightly tag to current commit
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ needs.check-changes.outputs.head_sha }}
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly',
                sha: process.env.HEAD_SHA,
                force: true,
              });
              core.info(`Updated tag nightly to ${process.env.HEAD_SHA}`);
            } catch (error) {
              if (
                error.status === 404 ||
                (error.status === 422 && /Reference does not exist/i.test(error.message || ''))
              ) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/nightly',
                  sha: process.env.HEAD_SHA,
                });
                core.info(`Created tag nightly at ${process.env.HEAD_SHA}`);
              } else {
                throw error;
              }
            }

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: false
          make_latest: false
          target_commitish: ${{ needs.check-changes.outputs.head_sha }}
          body: |
            Automated nightly build for commit `${{ needs.check-changes.outputs.head_sha }}`.

            Build date: `${{ needs.check-changes.outputs.build_date }}`
            Build sequence: `${{ needs.check-changes.outputs.build_seq }}`
            Upload PyPI: `${{ needs.check-changes.outputs.upload_pypi }}`

            <!-- nightly-source-sha: ${{ needs.check-changes.outputs.head_sha }} -->
          files: |
            release-upload/*
          overwrite_files: true

  publish-pypi:
    name: Publish nightly package to PyPI
    needs:
      - check-changes
      - build
    if: needs.check-changes.outputs.should_build == 'true' && needs.check-changes.outputs.upload_pypi == 'true'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare Python distributions
        shell: bash
        run: |
          set -euo pipefail

          src_root="release-artifacts"
          out_root="pypi-dist"
          rm -rf "${out_root}"
          mkdir -p "${out_root}"

          declare -A seen_sdist
          declare -a wheels
          declare -a sdists

          while IFS= read -r file; do
            case "${file}" in
              *.whl) wheels+=("${file}") ;;
              *.tar.gz) sdists+=("${file}") ;;
            esac
          done < <(find "${src_root}" -type f | sort)

          test "${#wheels[@]}" -gt 0
          test "${#sdists[@]}" -gt 0

          for file in "${wheels[@]}"; do
            cp "${file}" "${out_root}/"
          done

          for file in "${sdists[@]}"; do
            base=$(basename "${file}")
            if [[ -n "${seen_sdist["${base}"]:-}" ]]; then
              echo "Skipping duplicate sdist ${base} from ${file}"
              continue
            fi

            seen_sdist["${base}"]=1
            cp "${file}" "${out_root}/${base}"
          done

          find "${out_root}" -maxdepth 1 -type f | sort

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
